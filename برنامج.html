<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Bebas+Neue&family=Space+Mono:wght@700&family=Playfair+Display:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}

.app{
  width:100vw;height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;
  transition:background 0.6s;
}

/* ── THEMES ── */
.theme-midnight{background:radial-gradient(ellipse at 50% 40%,#14123a 0%,#0a0a0f 65%);--clr:#c8c8e8;--clr2:#5050a0;--clr3:#13131f;--acc:#7c6af5;--panelbg:#13131f;--sep:#2a2a4a;--glow:rgba(124,106,245,0.35)}
.theme-amoled  {background:#000;--clr:#fff;--clr2:#444;--clr3:#111;--acc:#e0e0e0;--panelbg:#0d0d0d;--sep:#222;--glow:rgba(255,255,255,0.12)}
.theme-forest  {background:radial-gradient(ellipse at 50% 40%,#122515 0%,#0a1a0c 65%);--clr:#a8e6b0;--clr2:#3a6e42;--clr3:#162318;--acc:#4caf50;--panelbg:#132016;--sep:#2a4a2e;--glow:rgba(76,175,80,0.3)}
.theme-ocean   {background:radial-gradient(ellipse at 50% 40%,#091828 0%,#060d1a 65%);--clr:#7ecfef;--clr2:#2a5a7c;--clr3:#0a1525;--acc:#38bdf8;--panelbg:#0b1828;--sep:#1a3a55;--glow:rgba(56,189,248,0.3)}
.theme-ember   {background:radial-gradient(ellipse at 50% 40%,#200e00 0%,#120500 65%);--clr:#ffb07a;--clr2:#7a3010;--clr3:#240d00;--acc:#ff6b35;--panelbg:#1f0d00;--sep:#4a2010;--glow:rgba(255,107,53,0.3)}
.theme-rose    {background:radial-gradient(ellipse at 50% 40%,#220a1c 0%,#130510 65%);--clr:#f0a0c0;--clr2:#7a2050;--clr3:#240010;--acc:#e879a0;--panelbg:#1f0a18;--sep:#4a1535;--glow:rgba(232,121,160,0.3)}
.theme-arctic  {background:radial-gradient(ellipse at 50% 40%,#daeef8 0%,#c5e2f5 65%);--clr:#1a3a4a;--clr2:#7aaabb;--clr3:#d0e8f0;--acc:#2a7a9a;--panelbg:#d5eaf2;--sep:#aaccdd;--glow:rgba(42,122,154,0.2)}

/* ── TABS ── */
.tabs{display:flex;gap:4px;background:var(--clr3);border-radius:30px;padding:5px;margin-bottom:2.2vh}
.tab{padding:8px 24px;border-radius:25px;border:none;background:transparent;color:var(--clr2);font-size:12px;cursor:pointer;transition:all 0.25s;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.tab.active{background:var(--acc);color:#fff;box-shadow:0 2px 14px var(--glow)}

/* ── DATE ── */
.date-lbl{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--clr2);margin-bottom:2.2vh;transition:opacity 0.3s}
.app.fullscreen-mode .date-lbl{opacity:0;pointer-events:none;margin:0}

/* ── PANELS ── */
.clock-wrap{display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.4s}

.panel{
  background:var(--panelbg);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  border:1px solid var(--sep);
  transition:all 0.4s;
  width:90px;height:120px;
  box-shadow:0 6px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
}
/* subtle shine */
.panel::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,0.04) 0%,transparent 50%,rgba(0,0,0,0.06) 100%);z-index:3;pointer-events:none}
/* divider */
.panel::after{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(0,0,0,0.55);z-index:4;box-shadow:0 1px 0 rgba(255,255,255,0.03)}

.panel span{color:var(--clr);line-height:1;transition:font-size 0.4s;position:relative;z-index:2}
.panel.flip span{animation:fd 0.32s cubic-bezier(.4,0,.2,1)}
.panel.alert{border-color:#ff4040 !important;box-shadow:0 0 22px rgba(255,50,50,0.35) !important}
.panel.alert span{color:#ff6060}

@keyframes fd{
  0%  {transform:perspective(500px) rotateX(-88deg) scale(0.95);opacity:0}
  60% {transform:perspective(500px) rotateX(8deg);opacity:1}
  100%{transform:perspective(500px) rotateX(0deg) scale(1);opacity:1}
}

.sep-dots{display:flex;flex-direction:column;gap:14px;padding-bottom:4px;transition:gap 0.4s}
.sep-dot{width:8px;height:8px;border-radius:50%;background:var(--sep);transition:all 0.4s}
.ampm-lbl{color:var(--clr2);align-self:center;margin-left:8px;letter-spacing:2px;transition:font-size 0.4s;font-size:18px}

/* ── FULLSCREEN ── */
.app.fullscreen-mode .panel{width:17vw;height:22vw;border-radius:1.8vw;max-width:240px;max-height:310px}
.app.fullscreen-mode .sep-dot{width:1.2vw;height:1.2vw}
.app.fullscreen-mode .sep-dots{gap:2vw}
.app.fullscreen-mode .clock-wrap{gap:1.8vw}
.app.fullscreen-mode .ampm-lbl{font-size:2.8vw}

/* ── FONTS normal ── */
.font-orbitron .panel span{font-family:'Orbitron',sans-serif;font-size:48px;font-weight:700}
.font-orbitron .ampm-lbl{font-family:'Orbitron',sans-serif;font-size:13px}
.font-orbitron .tinp{font-family:'Orbitron',sans-serif;font-size:22px}
.font-orbitron .tab,.font-orbitron .tb,.font-orbitron .date-lbl{font-family:'Orbitron',sans-serif}

.font-bebas .panel span{font-family:'Bebas Neue',cursive;font-size:80px}
.font-bebas .ampm-lbl{font-family:'Bebas Neue',cursive;font-size:22px}
.font-bebas .tinp{font-family:'Bebas Neue',cursive;font-size:38px}

.font-spacemono .panel span{font-family:'Space Mono',monospace;font-size:42px;font-weight:700}
.font-spacemono .ampm-lbl{font-family:'Space Mono',monospace;font-size:13px}
.font-spacemono .tinp{font-family:'Space Mono',monospace;font-size:20px}

.font-playfair .panel span{font-family:'Playfair Display',serif;font-size:58px;font-weight:700}
.font-playfair .ampm-lbl{font-family:'Playfair Display',serif;font-size:18px}
.font-playfair .tinp{font-family:'Playfair Display',serif;font-size:28px}

.font-sharetech .panel span{font-family:'Share Tech Mono',monospace;font-size:54px}
.font-sharetech .ampm-lbl{font-family:'Share Tech Mono',monospace;font-size:16px}
.font-sharetech .tinp{font-family:'Share Tech Mono',monospace;font-size:28px}

/* ── FONTS fullscreen ── */
.font-orbitron.fullscreen-mode .panel span{font-size:9vw}
.font-bebas.fullscreen-mode   .panel span{font-size:14vw}
.font-spacemono.fullscreen-mode .panel span{font-size:7.5vw}
.font-playfair.fullscreen-mode .panel span{font-size:10.5vw}
.font-sharetech.fullscreen-mode .panel span{font-size:10vw}

/* ── CONTROLS ── */
.controls{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:1.4rem}
.btn-r{border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s}
.btn-main{width:58px;height:58px;background:var(--acc);color:#fff;font-size:20px;box-shadow:0 4px 18px var(--glow)}
.btn-main:hover{transform:scale(1.07);box-shadow:0 6px 26px var(--glow)}
.btn-main:active{transform:scale(0.93)}
.btn-sm{width:42px;height:42px;background:var(--clr3);color:var(--clr2);border:1px solid var(--sep);font-size:17px}
.btn-sm:hover{color:var(--clr);border-color:var(--acc)}

/* ── TIMER INPUTS ── */
.tinputs{display:flex;align-items:center;gap:8px;margin-bottom:1.2rem}
.tgrp{display:flex;flex-direction:column;align-items:center;gap:5px}
.tlbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--clr2)}
.tinp{width:78px;background:var(--panelbg);border:1px solid var(--sep);border-radius:10px;color:var(--clr);text-align:center;padding:7px 0;outline:none;font-size:26px;transition:border-color 0.2s,box-shadow 0.2s}
.tinp:focus{border-color:var(--acc);box-shadow:0 0 10px var(--glow)}
.tinp::-webkit-inner-spin-button,.tinp::-webkit-outer-spin-button{-webkit-appearance:none}
.tsep{color:var(--sep);padding-bottom:20px;font-size:30px}

/* ── TIMER PROGRESS BAR ── */
.progress-bar-wrap{width:460px;max-width:90vw;margin-top:1.6rem}
.progress-bar-track{width:100%;height:5px;background:var(--sep);border-radius:99px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:99px;background:var(--acc);box-shadow:0 0 10px var(--glow);transition:width 1s linear,background 0.4s}

/* ── LAPS ── */
.laps-list{margin-top:1rem;width:100%;max-width:380px;max-height:110px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--sep) transparent}
.lap-item{display:flex;justify-content:space-between;align-items:center;padding:5px 12px;border-radius:7px;font-size:13px;animation:lapIn 0.2s ease}
@keyframes lapIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.lap-item:nth-child(odd){background:var(--clr3)}
.lap-n{color:var(--clr2);font-size:11px;letter-spacing:1px}
.lap-t{color:var(--clr);font-variant-numeric:tabular-nums;font-weight:600}
.lap-d{color:var(--clr2);font-size:11px}

/* ── TOOLBARS ── */
.features{transition:opacity 0.3s,max-height 0.4s;overflow:hidden;max-height:400px;opacity:1;width:100%;display:flex;flex-direction:column;align-items:center}
.features.hidden{max-height:0;opacity:0;pointer-events:none}
.toolbar{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:1.2rem}
.tb{padding:5px 13px;border-radius:18px;border:1px solid var(--sep);background:var(--clr3);color:var(--clr2);font-size:12px;cursor:pointer;transition:all 0.2s}
.tb:hover{border-color:var(--acc);color:var(--acc)}
.tb.on{background:var(--acc);color:#fff;border-color:var(--acc);box-shadow:0 2px 10px var(--glow)}

/* ── TOP BUTTONS ── */
.top-btns{position:fixed;top:14px;right:14px;display:flex;gap:8px;z-index:100}
.icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--sep);background:var(--clr3);color:var(--clr2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all 0.2s}
.icon-btn:hover{border-color:var(--acc);color:var(--acc)}

/* ── SETTINGS PANEL ── */
.settings-panel{
  position:fixed;bottom:70px;right:14px;
  background:var(--panelbg);border:1px solid var(--sep);
  border-radius:16px;padding:18px;width:290px;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
  z-index:99;
  opacity:0;transform:scale(0.9) translateY(12px);
  pointer-events:none;transition:opacity 0.22s,transform 0.22s;
}
.settings-panel.open{opacity:1;transform:scale(1) translateY(0);pointer-events:all}
.set-section{margin-bottom:14px}
.set-label{display:block;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--clr2);margin-bottom:8px}
.tb-row{display:flex;gap:5px;flex-wrap:wrap}

/* settings gear btn */
.gear-btn{position:fixed;bottom:18px;right:14px;width:38px;height:38px;border-radius:50%;border:1px solid var(--sep);background:var(--clr3);color:var(--clr2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all 0.25s;z-index:100}
.gear-btn:hover{border-color:var(--acc);color:var(--acc)}
.gear-btn.open{transform:rotate(90deg);border-color:var(--acc);color:var(--acc)}

/* kbd hint */
.kbd{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:2px;color:var(--clr2);opacity:0.4;text-transform:uppercase;pointer-events:none;white-space:nowrap}
</style>
</head>
<body>

<!-- top right buttons -->
<div class="top-btns">
  <button class="icon-btn" id="fsbtn" onclick="toggleFS()" title="Fullscreen (F)">&#x26F6;</button>
</div>

<!-- gear / settings -->
<button class="gear-btn" id="gearbtn" onclick="toggleSettings()" title="Settings">&#9881;</button>
<div class="settings-panel" id="setPanel">
  <div class="set-section">
    <span class="set-label">Theme</span>
    <div class="tb-row" id="tbar-themes">
      <button class="tb on" onclick="setTheme('midnight',this)">Midnight</button>
      <button class="tb"    onclick="setTheme('amoled',this)">AMOLED</button>
      <button class="tb"    onclick="setTheme('forest',this)">Forest</button>
      <button class="tb"    onclick="setTheme('ocean',this)">Ocean</button>
      <button class="tb"    onclick="setTheme('ember',this)">Ember</button>
      <button class="tb"    onclick="setTheme('rose',this)">Rose</button>
      <button class="tb"    onclick="setTheme('arctic',this)">Arctic</button>
    </div>
  </div>
  <div class="set-section" style="margin-bottom:0">
    <span class="set-label">Font</span>
    <div class="tb-row" id="tbar-fonts">
      <button class="tb on" onclick="setFont('orbitron',this)">Orbitron</button>
      <button class="tb"    onclick="setFont('bebas',this)">Bebas</button>
      <button class="tb"    onclick="setFont('spacemono',this)">Space Mono</button>
      <button class="tb"    onclick="setFont('playfair',this)">Playfair</button>
      <button class="tb"    onclick="setFont('sharetech',this)">Share Tech</button>
    </div>
  </div>
</div>

<div class="kbd" id="kbdHint">Space: play/pause &nbsp;·&nbsp; R: reset &nbsp;·&nbsp; F: fullscreen</div>

<div class="app theme-midnight font-orbitron" id="app">

  <!-- TABS -->
  <div class="features" id="feat-top">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('clock')">Clock</button>
      <button class="tab"        onclick="switchTab('timer')">Timer</button>
      <button class="tab"        onclick="switchTab('stopwatch')">Stopwatch</button>
    </div>
  </div>

  <!-- DATE -->
  <div class="date-lbl" id="dateLbl"></div>

  <!-- CLOCK -->
  <div id="tab-clock">
    <div class="clock-wrap">
      <div class="panel" id="h1"><span id="h1v">0</span></div>
      <div class="panel" id="h2"><span id="h2v">0</span></div>
      <div class="sep-dots"><div class="sep-dot"></div><div class="sep-dot"></div></div>
      <div class="panel" id="m1"><span id="m1v">0</span></div>
      <div class="panel" id="m2"><span id="m2v">0</span></div>
      <div class="sep-dots"><div class="sep-dot"></div><div class="sep-dot"></div></div>
      <div class="panel" id="s1"><span id="s1v">0</span></div>
      <div class="panel" id="s2"><span id="s2v">0</span></div>
      <div class="ampm-lbl" id="ampm">AM</div>
    </div>
  </div>

  <!-- TIMER -->
  <div id="tab-timer" style="display:none;text-align:center">
    <div class="tinputs" id="tinputs">
      <div class="tgrp"><div class="tlbl">HRS</div><input class="tinp" id="t-h" type="number" min="0" max="99" value="0"></div>
      <div class="tsep">:</div>
      <div class="tgrp"><div class="tlbl">MIN</div><input class="tinp" id="t-m" type="number" min="0" max="59" value="5"></div>
      <div class="tsep">:</div>
      <div class="tgrp"><div class="tlbl">SEC</div><input class="tinp" id="t-s" type="number" min="0" max="59" value="0"></div>
    </div>
    <div class="clock-wrap" id="tdisplay" style="display:none">
      <div class="panel" id="th1"><span id="th1v">0</span></div>
      <div class="panel" id="th2"><span id="th2v">0</span></div>
      <div class="sep-dots"><div class="sep-dot"></div><div class="sep-dot"></div></div>
      <div class="panel" id="tm1"><span id="tm1v">0</span></div>
      <div class="panel" id="tm2"><span id="tm2v">0</span></div>
      <div class="sep-dots"><div class="sep-dot"></div><div class="sep-dot"></div></div>
      <div class="panel" id="ts1"><span id="ts1v">0</span></div>
      <div class="panel" id="ts2"><span id="ts2v">0</span></div>
    </div>
    <div class="progress-bar-wrap" id="progressWrap" style="display:none">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressFill" style="width:100%"></div>
      </div>
    </div>
    <div class="controls" id="tcontrols">
      <button class="btn-r btn-sm" onclick="timerReset()" title="Reset (R)">&#10226;</button>
      <button class="btn-r btn-main" id="tplay" onclick="timerToggle()">&#9654;</button>
    </div>
  </div>

  <!-- STOPWATCH -->
  <div id="tab-sw" style="display:none;text-align:center">
    <div class="clock-wrap">
      <div class="panel" id="sw-h1"><span id="sw-h1v">0</span></div>
      <div class="panel" id="sw-h2"><span id="sw-h2v">0</span></div>
      <div class="sep-dots"><div class="sep-dot"></div><div class="sep-dot"></div></div>
      <div class="panel" id="sw-m1"><span id="sw-m1v">0</span></div>
      <div class="panel" id="sw-m2"><span id="sw-m2v">0</span></div>
      <div class="sep-dots"><div class="sep-dot"></div><div class="sep-dot"></div></div>
      <div class="panel" id="sw-s1"><span id="sw-s1v">0</span></div>
      <div class="panel" id="sw-s2"><span id="sw-s2v">0</span></div>
    </div>
    <div class="controls" id="swcontrols">
      <button class="btn-r btn-sm" onclick="swLap()" title="Lap (L)">&#9873;</button>
      <button class="btn-r btn-main" id="swplay" onclick="swToggle()">&#9654;</button>
      <button class="btn-r btn-sm" onclick="swReset()" title="Reset (R)">&#10226;</button>
    </div>
    <div class="laps-list" id="laps"></div>
  </div>

</div><!-- end .app -->

<script>
const app = document.getElementById('app');
let isFull=false, setOpen=false;

// ── Date ──
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function updateDate(){
  const d=new Date();
  document.getElementById('dateLbl').textContent=`${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
updateDate();setInterval(updateDate,30000);

// ── Flip ──
function fp(pid,vid,v){
  const el=document.getElementById(vid);
  const p=document.getElementById(pid);
  if(!el||!p)return;
  if(el.textContent!==String(v)){
    el.textContent=v;
    p.classList.remove('flip');
    void p.offsetWidth;
    p.classList.add('flip');
  }
}
function setPanels(pre,hh,mm,ss,al){
  ['h1','h2','m1','m2','s1','s2'].forEach((id,i)=>{
    const vals=[hh[0],hh[1],mm[0],mm[1],ss[0],ss[1]];
    const p=document.getElementById(pre+id);
    if(p){al?p.classList.add('alert'):p.classList.remove('alert');}
    fp(pre+id,pre+id+'v',vals[i]);
  });
}

// ── Clock ──
function clockTick(){
  const now=new Date();let h=now.getHours();
  const ap=h>=12?'PM':'AM';h=h%12||12;
  setPanels('',String(h).padStart(2,'0'),String(now.getMinutes()).padStart(2,'0'),String(now.getSeconds()).padStart(2,'0'),false);
  document.getElementById('ampm').textContent=ap;
}
clockTick();setInterval(clockTick,1000);

// ── Timer + progress bar ──
let tsecs=0,timerTotal=0,trun=false,tiv=null;

function progressSet(ratio,al){
  const fill=document.getElementById('progressFill');
  fill.style.width=(Math.max(0,Math.min(1,ratio))*100)+'%';
  fill.style.background=al?'#ff4040':'var(--acc)';
  fill.style.boxShadow=al?'0 0 12px rgba(255,60,60,0.6)':'0 0 10px var(--glow)';
}

function timerToggle(){
  if(!trun){
    if(tsecs===0){
      const h=parseInt(document.getElementById('t-h').value)||0;
      const m=parseInt(document.getElementById('t-m').value)||0;
      const s=parseInt(document.getElementById('t-s').value)||0;
      tsecs=h*3600+m*60+s;
      if(!tsecs)return;
      timerTotal=tsecs;
      document.getElementById('tinputs').style.display='none';
      document.getElementById('tdisplay').style.display='flex';
      document.getElementById('progressWrap').style.display='block';
      progressSet(1,false);
      timerDraw();
    }
    trun=true;document.getElementById('tplay').innerHTML='&#9646;&#9646;';
    tiv=setInterval(()=>{
      tsecs--;timerDraw();
      if(tsecs<=0){tsecs=0;clearInterval(tiv);trun=false;document.getElementById('tplay').innerHTML='&#9654;';beep();}
    },1000);
  } else {
    clearInterval(tiv);trun=false;document.getElementById('tplay').innerHTML='&#9654;';
  }
}
function timerDraw(){
  const h=Math.floor(tsecs/3600),m=Math.floor((tsecs%3600)/60),s=tsecs%60;
  const al=tsecs<=10&&tsecs>0;
  setPanels('t',String(h).padStart(2,'0'),String(m).padStart(2,'0'),String(s).padStart(2,'0'),al);
  if(timerTotal>0) progressSet(tsecs/timerTotal,al);
}
function timerReset(){
  clearInterval(tiv);trun=false;tsecs=0;timerTotal=0;
  document.getElementById('tplay').innerHTML='&#9654;';
  document.getElementById('tinputs').style.display='flex';
  document.getElementById('tdisplay').style.display='none';
  document.getElementById('progressWrap').style.display='none';
}
function beep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[880,0],[880,0.35],[1100,0.7]].forEach(([f,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;
      g.gain.setValueAtTime(0.4,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.3);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.31);
    });
  }catch(e){}
}

// ── Stopwatch ──
let swMs=0,lastLap=0,swRun=false,swIv=null;
function swToggle(){
  if(!swRun){
    swRun=true;document.getElementById('swplay').innerHTML='&#9646;&#9646;';
    const st=Date.now()-swMs;
    swIv=setInterval(()=>{swMs=Date.now()-st;swDraw();},250);
  } else {
    clearInterval(swIv);swRun=false;document.getElementById('swplay').innerHTML='&#9654;';
  }
}
function swReset(){
  clearInterval(swIv);swRun=false;swMs=0;lastLap=0;
  document.getElementById('swplay').innerHTML='&#9654;';
  document.getElementById('laps').innerHTML='';swDraw();
}
function swLap(){
  if(!swRun)return;
  const delta=swMs-lastLap;lastLap=swMs;
  const n=document.getElementById('laps').children.length+1;
  const div=document.createElement('div');div.className='lap-item';
  div.innerHTML=`<span class="lap-n">LAP ${String(n).padStart(2,'0')}</span><span class="lap-t">${swFmt(swMs)}</span><span class="lap-d">+${swFmt(delta)}</span>`;
  document.getElementById('laps').prepend(div);
}
function swFmt(ms){
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}
function swDraw(){
  const s=Math.floor(swMs/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  setPanels('sw-',String(h).padStart(2,'0'),String(m).padStart(2,'0'),String(sc).padStart(2,'0'),false);
}
swDraw();

// ── Tab ──
let curTab='clock';
function switchTab(t){
  curTab=t;
  document.getElementById('tab-clock').style.display=t==='clock'?'block':'none';
  document.getElementById('tab-timer').style.display=t==='timer'?'block':'none';
  document.getElementById('tab-sw').style.display=t==='stopwatch'?'block':'none';
  document.getElementById('dateLbl').style.display=t==='clock'?'block':'none';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['clock','timer','stopwatch'][i]===t));
}

// ── Fullscreen ──
function toggleFS(){
  isFull=!isFull;
  const btn=document.getElementById('fsbtn');
  if(isFull){
    app.classList.add('fullscreen-mode');
    document.querySelectorAll('.features').forEach(f=>f.classList.add('hidden'));
    ['tcontrols','swcontrols'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
    const lp=document.getElementById('laps');if(lp)lp.style.display='none';
    btn.innerHTML='&#x2715;';
    document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();
  } else {
    app.classList.remove('fullscreen-mode');
    document.querySelectorAll('.features').forEach(f=>f.classList.remove('hidden'));
    ['tcontrols','swcontrols'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='flex';});
    const lp=document.getElementById('laps');if(lp)lp.style.display='block';
    btn.innerHTML='&#x26F6;';
    document.exitFullscreen&&document.exitFullscreen();
  }
}

// ── Settings ──
function toggleSettings(){
  setOpen=!setOpen;
  document.getElementById('setPanel').classList.toggle('open',setOpen);
  document.getElementById('gearbtn').classList.toggle('open',setOpen);
}
document.addEventListener('click',e=>{
  if(!e.target.closest('#setPanel')&&!e.target.closest('.gear-btn')){
    setOpen=false;
    document.getElementById('setPanel').classList.remove('open');
    document.getElementById('gearbtn').classList.remove('open');
  }
});

function setTheme(t,el){
  app.className=app.className.replace(/theme-\S+/,'theme-'+t);
  document.querySelectorAll('#tbar-themes .tb').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}
function setFont(f,el){
  app.className=app.className.replace(/font-\S+/,'font-'+f);
  document.querySelectorAll('#tbar-fonts .tb').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}

// ── Keyboard ──
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();curTab==='timer'?timerToggle():curTab==='stopwatch'?swToggle():null;}
  if(e.key==='r'||e.key==='R'){curTab==='timer'?timerReset():curTab==='stopwatch'?swReset():null;}
  if(e.key==='l'||e.key==='L'){swLap();}
  if(e.key==='f'||e.key==='F'){toggleFS();}
  if(e.key==='Escape'&&isFull){toggleFS();}
});
</script>
